services:
  # Spring Boot app (kèm Flutter Web tại /mobile/index.html)
  app:
    build: .
    ports:
      - "8080:8080"

  # E2E test desktop: docker compose run --rm e2e-test
  e2e-test:
    image: mcr.microsoft.com/playwright:v1.60.0-jammy
    profiles: ["test"]
    depends_on:
      app:
        condition: service_healthy
    environment:
      BASE_URL: http://app:8080
    working_dir: /work
    volumes:
      - .:/work
    command: >
      bash -c "npm ci && npx playwright test --project='Desktop Chrome'"

  # Native mobile test requires Android Emulator on the Windows host.
  # Run locally with: Topic 4-Mobile testing\run.bat
  mobile-test:
    image: mcr.microsoft.com/playwright:v1.60.0-jammy
    profiles: ["test"]
    depends_on:
      app:
        condition: service_healthy
    environment:
      BASE_URL: http://app:8080
    working_dir: /work
    volumes:
      - .:/work
    command: >
      bash -c "echo 'Native mobile tests require Android Emulator and must be run on the host with Topic 4-Mobile testing/run.bat.'"
