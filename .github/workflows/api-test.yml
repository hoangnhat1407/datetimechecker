name: API Testing DateTimeChecker SWT301
on: [push]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run Unit Tests (gồm DayInMonth UTCID01..UTCID15)
        run: |
          chmod +x mvnw
          ./mvnw test | tee mvn-test.log
      - name: Publish DayInMonth report to job summary
        if: always()
        run: |
          {
            echo "## Unit Test Report — DayInMonth (UTCID01..UTCID15)"
            echo ""
            echo '```'
            sed -n '/UNIT TEST REPORT: DayInMonth/,/^Total:/p' mvn-test.log || echo "report not found"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: warn

  api-test:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build app
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests
      - name: Start Spring Boot
        run: |
          nohup java -jar target/*.jar > spring-boot.log 2>&1 &
          echo $! > spring-boot.pid
      - name: Wait for app to be ready
        run: |
          ready=false
          for i in {1..30}; do
            if curl -fsS -X POST http://localhost:8080/api/datetime/check \
              -H "Content-Type: application/json" \
              -d '{"day":"1","month":"1","year":"2000"}' > /dev/null; then
              echo "App is ready!"
              ready=true
              break
            fi
            echo "Attempt $i - not ready yet"
            sleep 3
          done
          if [ "$ready" != "true" ]; then
            echo "App did not become ready. Spring Boot log:"
            cat spring-boot.log || true
            exit 1
          fi
      - name: Install Newman
        run: npm install -g newman
      - name: Run API Tests
        run: |
          newman run "Topic 2-API testing/DateTimeChecker API.postman_collection.json" \
            --iteration-data test-data.json \
            --env-var "baseUrl=http://localhost:8080" \
            --folder "datetimecheck" \
            --reporters cli,json \
            --reporter-json-export newman-summary.json
      - name: Upload API test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-test-reports
          path: |
            newman-summary.json
            spring-boot.log
          if-no-files-found: warn

  e2e-test:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build app
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests
      - name: Start Spring Boot
        run: java -jar target/*.jar &
      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080/api/datetime/check > /dev/null 2>&1; then
              echo "App is ready!"
              break
            fi
            sleep 3
          done
      - name: Install Playwright
        run: |
          npm init -y
          npm install @playwright/test
          chmod +x ./node_modules/.bin/playwright
          ./node_modules/.bin/playwright install --with-deps chromium
      - name: Run E2E Tests
        run: ./node_modules/.bin/playwright test

  mobile-test:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build app
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests
      - name: Start Spring Boot
        run: java -jar target/*.jar &
      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080/api/datetime/check > /dev/null 2>&1; then
              echo "App is ready!"
              break
            fi
            sleep 3
          done
      - name: Install Playwright
        run: |
          npm init -y
          npm install @playwright/test
          chmod +x ./node_modules/.bin/playwright
          ./node_modules/.bin/playwright install --with-deps chromium
      - name: Run Mobile Tests
        # Bỏ qua [Demo canvas]: chỉ phục vụ demo trực quan (waitForTimeout dài),
        # tính đúng/sai đã được nhóm [Mobile] xác thực qua mobile context.
        run: ./node_modules/.bin/playwright test --config="Topic 4-mobile testing/playwright.mobile.config.js" --project="iPhone 14 Pro Max" --grep-invert "Demo canvas"

  k6-test:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build app
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests
      - name: Start Spring Boot
        run: java -jar target/*.jar &
      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080/api/datetime/check > /dev/null 2>&1; then
              echo "App is ready!"
              break
            fi
            sleep 3
          done
      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6
      - name: Run k6 Load Test
        run: k6 run k6/load-test.js

  cicd-report:
    runs-on: ubuntu-latest
    needs: [unit-test, api-test, e2e-test, mobile-test, k6-test]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Generate CI/CD report
        run: |
          mkdir -p "Topic 3-CICD"

          UNIT_RESULT="${{ needs.unit-test.result }}"
          API_RESULT="${{ needs.api-test.result }}"
          E2E_RESULT="${{ needs.e2e-test.result }}"
          MOBILE_RESULT="${{ needs.mobile-test.result }}"
          K6_RESULT="${{ needs.k6-test.result }}"
          OVERALL_RESULT="PASS"

          if [ "$UNIT_RESULT" != "success" ] || [ "$API_RESULT" != "success" ] || [ "$E2E_RESULT" != "success" ] || [ "$MOBILE_RESULT" != "success" ] || [ "$K6_RESULT" != "success" ]; then
            OVERALL_RESULT="FAIL"
          fi

          cat > "Topic 3-CICD/CICD_REPORT.md" <<EOF
          # CI/CD Report - DateTimeChecker

          ## Summary

          - Overall result: $OVERALL_RESULT
          - Workflow: ${{ github.workflow }}
          - Branch: ${{ github.ref_name }}
          - Commit: ${{ github.sha }}
          - Triggered by: ${{ github.actor }}
          - Run number: ${{ github.run_number }}
          - Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ## Job Results

          | Job | Result |
          | --- | --- |
          | Unit Test | $UNIT_RESULT |
          | API Test | $API_RESULT |
          | E2E Test | $E2E_RESULT |
          | Mobile Test | $MOBILE_RESULT |
          | k6 Performance Test | $K6_RESULT |

          ## Reports and Logs

          - Open the GitHub Actions run URL above to view all logs.
          - Download the \`surefire-reports\` artifact for detailed Maven/JUnit test XML reports.
          - Download the \`cicd-report\` artifact for this markdown report.

          ## Demo Note

          This report is generated after all CI/CD jobs finish. It is intended for Topic 3 CI/CD demo reporting.
          EOF

          sed -i 's/^          //' "Topic 3-CICD/CICD_REPORT.md"
          cat "Topic 3-CICD/CICD_REPORT.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload CI/CD report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cicd-report
          path: Topic 3-CICD/CICD_REPORT.md
          if-no-files-found: error
