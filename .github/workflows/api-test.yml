name: API Tests
on: [push]

jobs:
  api-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build app
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests

      - name: Start Spring Boot
        run: java -jar target/*.jar &

      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080/api/datetime/check > /dev/null 2>&1; then
              echo "App is ready!"
              break
            fi
            echo "Attempt $i - not ready yet"
            sleep 3
          done

      - name: Install Newman
        run: npm install -g newman

      - name: Run API Tests
        run: newman run "DateTimeChecker API.postman_collection.json" --iteration-data test-data.json --env-var "baseUrl=http://localhost:8080"

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build app
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests

      - name: Start Spring Boot
        run: java -jar target/*.jar &

      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080/api/datetime/check > /dev/null 2>&1; then
              echo "App is ready!"
              break
            fi
            sleep 3
          done

      - name: Install Playwright
        run: |
            npm init -y
            npm install @playwright/test
            ./node_modules/.bin/playwright install --with-deps chromium

      - name: Run E2E Tests
        run: ./node_modules/.bin/playwright test

  k6-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build app
        run: |
          chmod +x mvnw
          ./mvnw package -DskipTests

      - name: Start Spring Boot
        run: java -jar target/*.jar &

      - name: Wait for app to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8080/api/datetime/check > /dev/null 2>&1; then
              echo "App is ready!"
              break
            fi
            sleep 3
          done

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 Load Test
        run: k6 run k6/load-test.js