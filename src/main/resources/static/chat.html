<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gemini Test Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f4f6f8;
        }

        .app-shell {
            max-width: 980px;
        }

        .chat-panel {
            height: 62vh;
            min-height: 420px;
            overflow-y: auto;
            background: #ffffff;
            border: 1px solid #dee2e6;
            border-radius: 8px;
        }

        .message {
            max-width: 82%;
            border-radius: 8px;
            padding: 12px 14px;
            white-space: pre-wrap;
        }

        .message-user {
            margin-left: auto;
            background: #0d6efd;
            color: white;
        }

        .message-assistant {
            margin-right: auto;
            background: #f1f3f5;
            color: #212529;
        }

        textarea {
            min-height: 108px;
            resize: vertical;
        }
    </style>
</head>

<body>
<main class="container app-shell py-4">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <h1 class="h3 mb-0">Gemini Test Chat</h1>
        <a class="btn btn-outline-secondary btn-sm" href="/">DateTimeChecker</a>
    </div>

    <section id="messages" class="chat-panel p-3 mb-3" aria-live="polite">
        <div class="message message-assistant mb-3">
            Hello. Ask me about testing DateTimeChecker, or generate test cases for the date validation feature.
        </div>
    </section>

    <form id="chatForm" class="bg-white border rounded-3 p-3">
        <div class="row g-2 mb-2">
            <div class="col-sm-8">
                <select id="mode" class="form-select" aria-label="Mode">
                    <option value="chat">Chat</option>
                    <option value="test-cases">Test cases</option>
                </select>
            </div>
            <div class="col-sm-4 d-grid">
                <button id="quickTestCases" type="button" class="btn btn-outline-primary">
                    Generate test cases
                </button>
            </div>
        </div>

        <textarea id="message" class="form-control mb-2" placeholder="Ask Gemini..." required></textarea>

        <div class="d-flex justify-content-end gap-2">
            <button id="clearChat" type="button" class="btn btn-outline-secondary">Clear</button>
            <button id="sendButton" type="submit" class="btn btn-primary">Send</button>
        </div>
    </form>
</main>

<script>
    const messages = document.getElementById('messages');
    const form = document.getElementById('chatForm');
    const messageInput = document.getElementById('message');
    const modeInput = document.getElementById('mode');
    const sendButton = document.getElementById('sendButton');
    const quickTestCases = document.getElementById('quickTestCases');
    const clearChat = document.getElementById('clearChat');

    function appendMessage(text, role) {
        const item = document.createElement('div');
        item.className = `message message-${role} mb-3`;
        item.textContent = text;
        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight;
    }

    async function sendMessage(text, mode) {
        appendMessage(text, 'user');
        sendButton.disabled = true;
        quickTestCases.disabled = true;

        try {
            const response = await fetch('/api/gemini/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text, mode })
            });

            const data = await response.json();
            appendMessage(data.ok ? data.reply : data.error, 'assistant');
        } catch (error) {
            appendMessage(`Request failed: ${error.message}`, 'assistant');
        } finally {
            sendButton.disabled = false;
            quickTestCases.disabled = false;
            messageInput.focus();
        }
    }

    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        const text = messageInput.value.trim();
        if (!text) return;
        messageInput.value = '';
        await sendMessage(text, modeInput.value);
    });

    quickTestCases.addEventListener('click', async () => {
        modeInput.value = 'test-cases';
        const text = 'Create a compact but complete set of test cases for DateTimeChecker. Include valid boundary dates, invalid day/month/year ranges, leap-year cases, non-numeric input, expected valid, expected field, and a short reason.';
        await sendMessage(text, 'test-cases');
    });

    clearChat.addEventListener('click', () => {
        messages.innerHTML = '';
        appendMessage('Hello. Ask me about testing DateTimeChecker, or generate test cases for the date validation feature.', 'assistant');
    });
</script>
</body>

</html>
